{% extends 'remoteuser/user_page.html' %}
{% load static %}

{% block extra_head %}
<style>
    html, body {
        height: 100%;
        margin: 0;
        padding: 0;
    }

    /* Fullscreen responsive background */
    body {
        background-image: url("{% static 'images/background.jpg' %}");
        background-size: cover;              /* Fill entire screen */
        background-position: center center;  /* Center image */
        background-repeat: no-repeat;
        background-attachment: fixed;        /* Smooth desktop effect */
        min-height: 100vh;
        color: #ffffff;
    }

    /* Dark overlay for readability */
    .overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        z-index: 0;
    }

    /* Main content box */
    .container {
        position: relative;
        z-index: 2;
        max-width: 900px;
        margin: auto;
        margin-top: 120px;
        padding: 40px;
        background: rgba(255, 255, 255, 0.9);
        border-radius: 15px;
        color: #333;
        text-align: center;
        box-shadow: 0 0 25px rgba(0,0,0,0.3);
    }

    h1 {
        font-weight: bold;
        margin-bottom: 20px;
    }

    /* Mobile responsive fix */
    @media (max-width: 768px) {
        body {
            background-attachment: scroll;
        }

        .container {
            margin-top: 60px;
            padding: 20px;
        }
    }
</style>
{% endblock %}

{% block content %}

<!-- Overlay -->
<div class="overlay"></div>

<!-- Page Content -->
<div class="container">
    <h1>Welcome to User Home!!</h1>
    <p>This is your dashboard where you can access your profile, settings, and other features.</p>
</div>

{% endblock %}
