<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}ThyroScan Admin{% endblock %}</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:        #08050f;
      --surface:   #100b1d;
      --card:      #150d25;
      --border:    #2a1a40;
      --accent:    #b97aff;
      --accent2:   #7c3aed;
      --danger:    #ff4d6d;
      --success:   #00f5a0;
      --warn:      #f4a261;
      --text:      #e2d4f5;
      --muted:     #6b5090;
      --font-head: 'Rajdhani', sans-serif;
      --font-mono: 'Space Mono', monospace;
      --font-body: 'DM Sans', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text);
      font-family: var(--font-body); min-height: 100vh;
      display: flex; flex-direction: column; overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background-image:
        radial-gradient(ellipse 70% 50% at 20% 10%, rgba(124,58,237,.1) 0%, transparent 55%),
        radial-gradient(ellipse 50% 40% at 80% 90%, rgba(185,122,255,.07) 0%, transparent 50%),
        linear-gradient(rgba(124,58,237,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(124,58,237,.04) 1px, transparent 1px);
      background-size: 100% 100%, 100% 100%, 44px 44px, 44px 44px;
      pointer-events: none;
    }

    /* NAV */
    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(8,5,15,.9); backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 2rem; height: 62px;
    }
    .nav-brand { display: flex; align-items: center; gap: .75rem; text-decoration: none; }
    .nav-brand-icon {
      width: 34px; height: 34px; border-radius: 8px;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      display: flex; align-items: center; justify-content: center; font-size: 16px;
    }
    .nav-brand-text {
      font-family: var(--font-head); font-size: 1.2rem; font-weight: 700;
      letter-spacing: 2px; color: var(--accent);
    }
    .admin-pill {
      background: rgba(185,122,255,.1); border: 1px solid rgba(185,122,255,.3);
      border-radius: 20px; padding: .3rem .85rem;
      font-family: var(--font-mono); font-size: .68rem; color: var(--accent);
      letter-spacing: 1px; text-transform: uppercase;
    }
    .nav-right { display: flex; align-items: center; gap: 1rem; }
    .logout-btn {
      display: flex; align-items: center; gap: .4rem;
      background: rgba(255,77,109,.1); border: 1px solid rgba(255,77,109,.2);
      border-radius: 8px; padding: .4rem .85rem;
      color: var(--danger); text-decoration: none;
      font-family: var(--font-mono); font-size: .72rem; transition: background .2s;
    }
    .logout-btn:hover { background: rgba(255,77,109,.2); }

    /* LAYOUT */
    .app-layout { display: flex; flex: 1; position: relative; z-index: 1; }
    .sidebar {
      width: 230px; min-height: calc(100vh - 62px);
      background: rgba(16,11,29,.9); border-right: 1px solid var(--border);
      padding: 1.5rem 1rem; display: flex; flex-direction: column; gap: .25rem;
      position: sticky; top: 62px; height: calc(100vh - 62px); overflow-y: auto;
    }
    .sidebar-section {
      font-family: var(--font-mono); font-size: .6rem;
      letter-spacing: 3px; text-transform: uppercase; color: var(--muted);
      padding: .5rem .75rem; margin-top: .75rem;
    }
    .sidebar a {
      display: flex; align-items: center; gap: .75rem;
      padding: .6rem .75rem; border-radius: 8px;
      color: var(--muted); text-decoration: none; font-size: .88rem; transition: all .2s;
    }
    .sidebar a:hover, .sidebar a.active { background: rgba(185,122,255,.08); color: var(--text); }
    .sidebar a.active { color: var(--accent); border-left: 2px solid var(--accent); border-radius: 0 8px 8px 0; }
    .sidebar-icon { font-size: 1rem; width: 20px; text-align: center; }
    .main-content { flex: 1; padding: 2rem; overflow: auto; }

    /* SHARED COMPONENTS */
    .card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 1.75rem; position: relative; overflow: hidden;
    }
    .card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent); opacity: .25;
    }
    .section-label {
      font-family: var(--font-mono); font-size: .7rem;
      letter-spacing: 3px; text-transform: uppercase; color: var(--accent); margin-bottom: .5rem;
    }
    h1,h2,h3,h4 { font-family: var(--font-head); letter-spacing: 1px; }
    .btn {
      display: inline-flex; align-items: center; gap: .5rem;
      padding: .6rem 1.2rem; border-radius: 8px;
      font-family: var(--font-mono); font-size: .78rem; font-weight: 700;
      letter-spacing: 1px; text-transform: uppercase;
      cursor: pointer; border: none; text-decoration: none; transition: all .2s;
    }
    .btn-primary { background: linear-gradient(135deg, var(--accent2), var(--accent)); color: #fff; }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(185,122,255,.3); }
    .btn-danger  { background: var(--danger); color: #fff; }
    .btn-danger:hover { opacity:.85; }
    .btn-success { background: var(--success); color: #000; }
    .btn-sm { padding: .3rem .7rem; font-size: .68rem; }

    .form-group { margin-bottom: 1.25rem; }
    .form-group label {
      display: block; font-family: var(--font-mono); font-size: .7rem;
      letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: .5rem;
    }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%; padding: .7rem 1rem;
      background: rgba(255,255,255,.04); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-family: var(--font-body); font-size: .95rem;
      transition: border-color .2s; outline: none;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      border-color: var(--accent); box-shadow: 0 0 0 3px rgba(185,122,255,.12);
    }
    table { width: 100%; border-collapse: collapse; }
    th {
      font-family: var(--font-mono); font-size: .7rem; letter-spacing: 2px;
      text-transform: uppercase; color: var(--muted);
      padding: .75rem 1rem; border-bottom: 1px solid var(--border); text-align: left;
    }
    td { padding: .8rem 1rem; border-bottom: 1px solid rgba(42,26,64,.5); font-size: .9rem; }
    tr:hover td { background: rgba(185,122,255,.03); }
    .badge {
      display: inline-block; padding: .2rem .6rem; border-radius: 20px;
      font-family: var(--font-mono); font-size: .65rem; font-weight: 700; text-transform: uppercase;
    }
    .badge-active   { background: rgba(0,245,160,.15); color: var(--success); }
    .badge-inactive { background: rgba(255,77,109,.15); color: var(--danger); }
    .scanline { position: absolute; inset: 0; pointer-events: none; overflow: hidden; border-radius: inherit; }
    .scanline::after {
      content: ''; position: absolute; width: 100%; height: 2px;
      background: linear-gradient(90deg, transparent, rgba(185,122,255,.1), transparent);
      animation: scan 5s linear infinite;
    }
    @keyframes scan{0%{top:-2px}100%{top:100%}}
    .alert { padding:.8rem 1.1rem;border-radius:8px;margin-bottom:1rem;font-size:.88rem;border-left:3px solid; }
    .alert-error{background:rgba(255,77,109,.1);border-color:var(--danger);color:#ff8fa3;}
    .alert-success{background:rgba(0,245,160,.1);border-color:var(--success);color:var(--success);}

    footer {
      position: relative; z-index: 1;
      border-top: 1px solid var(--border); padding: 1rem 2rem;
      display: flex; justify-content: space-between;
      font-family: var(--font-mono); font-size: .68rem; color: var(--muted);
    }
    .pulse-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:pulse 2s ease-in-out infinite;display:inline-block;}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>
  <nav>
    <a class="nav-brand" href="{% url 'admin_home' %}">
      <div class="nav-brand-icon">🛡️</div>
      <span class="nav-brand-text">THYROSCAN</span>
    </a>
    <div class="nav-right">
      <div class="admin-pill">🔒 Admin Console</div>
      <a href="{% url 'logout' %}" class="logout-btn">⏏ Logout</a>
    </div>
  </nav>

  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-section">Admin Panel</div>
      <a href="{% url 'admin_home' %}" class="{% block nav_dash %}{% endblock %}">
        <span class="sidebar-icon">📊</span> Dashboard
      </a>
      <a href="{% url 'admin_home' %}" class="{% block nav_users %}{% endblock %}">
        <span class="sidebar-icon">👥</span> Manage Users
      </a>
      <div class="sidebar-section" style="margin-top:auto;"></div>
      <a href="{% url 'logout' %}">
        <span class="sidebar-icon">⏏</span> Logout
      </a>
    </aside>

    <main class="main-content">
      {% block content %}{% endblock %}
    </main>
  </div>

  <footer>
    <div><span class="pulse-dot"></span>&nbsp; ThyroScan Admin Console</div>
    <div>© 2025 Thyroid Detection System</div>
  </footer>
</body>
</html>
