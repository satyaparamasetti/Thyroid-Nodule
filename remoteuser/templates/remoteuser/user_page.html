<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Thyroid Nodule Detection — User Portal{% endblock %}</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:        #060d14;
      --surface:   #0b1622;
      --card:      #0f1e2e;
      --border:    #1a3048;
      --accent:    #00d4ff;
      --accent2:   #0077b6;
      --danger:    #ff4d6d;
      --success:   #00f5a0;
      --warn:      #f4a261;
      --text:      #cce7f5;
      --muted:     #4a7a9b;
      --font-head: 'Rajdhani', sans-serif;
      --font-mono: 'Space Mono', monospace;
      --font-body: 'DM Sans', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text);
      font-family: var(--font-body); min-height: 100vh;
      display: flex; flex-direction: column; overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background-image:
        radial-gradient(ellipse 80% 60% at 50% -10%, rgba(0,212,255,.08) 0%, transparent 60%),
        linear-gradient(rgba(0,119,182,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,119,182,.04) 1px, transparent 1px);
      background-size: 100% 100%, 40px 40px, 40px 40px;
      pointer-events: none;
    }

    /* ── SIDEBAR + LAYOUT ── */
    .app-layout { display: flex; flex: 1; position: relative; z-index: 1; }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 240px; min-height: calc(100vh - 62px);
      background: rgba(11,22,34,.9); border-right: 1px solid var(--border);
      padding: 1.5rem 1rem;
      display: flex; flex-direction: column; gap: .25rem;
      position: sticky; top: 62px; height: calc(100vh - 62px); overflow-y: auto;
    }
    .sidebar-section {
      font-family: var(--font-mono); font-size: .62rem;
      letter-spacing: 3px; text-transform: uppercase; color: var(--muted);
      padding: .5rem .75rem; margin-top: .75rem;
    }
    .sidebar a {
      display: flex; align-items: center; gap: .75rem;
      padding: .6rem .75rem; border-radius: 8px;
      color: var(--muted); text-decoration: none;
      font-size: .88rem; transition: all .2s;
    }
    .sidebar a:hover, .sidebar a.active {
      background: rgba(0,212,255,.08); color: var(--text);
    }
    .sidebar a.active { color: var(--accent); border-left: 2px solid var(--accent); border-radius: 0 8px 8px 0; }
    .sidebar-icon { font-size: 1rem; width: 20px; text-align: center; }

    /* ── TOP NAV ── */
    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(6,13,20,.9); backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 2rem; height: 62px;
    }
    .nav-brand {
      display: flex; align-items: center; gap: .75rem; text-decoration: none;
    }
    .nav-brand-icon {
      width: 34px; height: 34px; border-radius: 8px;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      display: flex; align-items: center; justify-content: center; font-size: 16px;
    }
    .nav-brand-text {
      font-family: var(--font-head); font-size: 1.2rem; font-weight: 700;
      letter-spacing: 2px; color: var(--accent);
    }
    .nav-right { display: flex; align-items: center; gap: 1rem; }
    .user-chip {
      display: flex; align-items: center; gap: .5rem;
      background: rgba(255,255,255,.04); border: 1px solid var(--border);
      border-radius: 20px; padding: .3rem .75rem;
      font-family: var(--font-mono); font-size: .72rem; color: var(--muted);
    }
    .logout-btn {
      display: flex; align-items: center; gap: .4rem;
      background: rgba(255,77,109,.1); border: 1px solid rgba(255,77,109,.2);
      border-radius: 8px; padding: .4rem .85rem;
      color: var(--danger); text-decoration: none;
      font-family: var(--font-mono); font-size: .72rem;
      transition: background .2s;
    }
    .logout-btn:hover { background: rgba(255,77,109,.2); }

    /* ── MAIN CONTENT ── */
    .main-content { flex: 1; padding: 2rem; overflow: auto; }

    /* ── CARDS ── */
    .card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 1.75rem; position: relative; overflow: hidden;
    }
    .card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent); opacity: .3;
    }

    /* shared util classes */
    .section-label {
      font-family: var(--font-mono); font-size: .7rem;
      letter-spacing: 3px; text-transform: uppercase; color: var(--accent);
      margin-bottom: .5rem;
    }
    h1,h2,h3,h4 { font-family: var(--font-head); letter-spacing: 1px; }
    .btn {
      display: inline-flex; align-items: center; gap: .5rem;
      padding: .6rem 1.25rem; border-radius: 8px;
      font-family: var(--font-mono); font-size: .78rem; font-weight: 700;
      letter-spacing: 1px; text-transform: uppercase;
      cursor: pointer; border: none; text-decoration: none; transition: all .2s;
    }
    .btn-primary { background: linear-gradient(135deg, var(--accent2), var(--accent)); color: #000; }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(0,212,255,.3); }
    .btn-outline { background: transparent; color: var(--accent); border: 1px solid var(--accent); }
    .btn-outline:hover { background: rgba(0,212,255,.08); }
    .btn-danger { background: var(--danger); color: #fff; }
    .form-group { margin-bottom: 1.25rem; }
    .form-group label {
      display: block; font-family: var(--font-mono); font-size: .7rem;
      letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: .5rem;
    }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%; padding: .7rem 1rem;
      background: rgba(255,255,255,.04); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-family: var(--font-body); font-size: .95rem;
      transition: border-color .2s; outline: none;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,212,255,.1);
    }
    table { width: 100%; border-collapse: collapse; }
    th {
      font-family: var(--font-mono); font-size: .7rem; letter-spacing: 2px;
      text-transform: uppercase; color: var(--muted);
      padding: .75rem 1rem; border-bottom: 1px solid var(--border); text-align: left;
    }
    td { padding: .8rem 1rem; border-bottom: 1px solid rgba(26,48,72,.5); font-size: .9rem; }
    tr:hover td { background: rgba(0,212,255,.03); }
    .badge {
      display: inline-block; padding: .2rem .6rem; border-radius: 20px;
      font-family: var(--font-mono); font-size: .65rem; font-weight: 700; text-transform: uppercase;
    }
    .badge-benign    { background: rgba(0,245,160,.15); color: var(--success); }
    .badge-malignant { background: rgba(255,77,109,.15); color: var(--danger); }
    .badge-pending   { background: rgba(244,162,97,.15); color: var(--warn); }
    .scanline { position: absolute; inset: 0; pointer-events: none; overflow: hidden; border-radius: inherit; }
    .scanline::after {
      content: ''; position: absolute; width: 100%; height: 2px;
      background: linear-gradient(90deg, transparent, rgba(0,212,255,.12), transparent);
      animation: scan 5s linear infinite;
    }
    @keyframes scan { 0%{top:-2px} 100%{top:100%} }

    footer {
      position: relative; z-index: 1;
      border-top: 1px solid var(--border);
      padding: 1rem 2rem;
      display: flex; justify-content: space-between;
      font-family: var(--font-mono); font-size: .68rem; color: var(--muted);
    }
    .pulse-dot { width:6px;height:6px;border-radius:50%;background:var(--success);animation:pulse 2s ease-in-out infinite;display:inline-block; }
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>
  <nav>
    <a class="nav-brand" href="{% url 'user_home' %}">
      <div>
        <span class="nav-brand-text">Thyroid Nodule Detection</span>
      </div>
    </a>
    <div class="nav-right">
      <div class="user-chip">👤 User Portal</div>
      <a href="{% url 'logout' %}" class="logout-btn">⏏ Logout</a>
    </div>
  </nav>

  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-section">Navigation</div>
      <a href="{% url 'user_home' %}" class="{% block nav_home %}{% endblock %}">
        <span class="sidebar-icon">🏠</span> Dashboard
      </a>
      <a href="{% url 'image_data' %}" class="{% block nav_data %}{% endblock %}">
        <span class="sidebar-icon">🖼️</span> Dataset
      </a>
      <a href="{% url 'build' %}" class="{% block nav_train %}{% endblock %}">
        <span class="sidebar-icon">⚙️</span> Train Model
      </a>
      <a href="{% url 'scores' %}" class="{% block nav_scores %}{% endblock %}">
        <span class="sidebar-icon">📊</span> Performance
      </a>
      <a href="{% url 'classify_image' %}" class="{% block nav_classify %}{% endblock %}">
        <span class="sidebar-icon">🔬</span> Detect Nodule
      </a>
      <div class="sidebar-section" style="margin-top:auto; padding-top:2rem;"></div>
      <a href="{% url 'logout' %}">
        <span class="sidebar-icon">⏏</span> Logout
      </a>
    </aside>

    <main class="main-content">
      {% block content %}{% endblock %}
    </main>
  </div>

  <footer>
    <div><span class="pulse-dot"></span> &nbsp;Thyroid Nodule Detection — User Portal</div>
    <div>© 2025 Thyroid Detection System</div>
  </footer>
</body>
</html>
